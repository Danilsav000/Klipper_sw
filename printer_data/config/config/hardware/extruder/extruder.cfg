
[include driver_e/TMC2209.cfg]

[extruder]
step_pin: toolhead:E_STEP
dir_pin: toolhead:E_DIR
enable_pin: !toolhead:E_ENABLE

rotation_distance: 47.088
gear_ratio: 9:1
full_steps_per_rotation: 200
instantaneous_corner_velocity: 1.5
max_extrude_cross_section: 15
max_extrude_only_distance: 220
min_extrude_temp: 200
min_temp: 20
max_temp: 340

microsteps: 16

nozzle_diameter: 0.4
filament_diameter: 1.75
pressure_advance: 0.02
pressure_advance_smooth_time: 0.2

heater_pin: toolhead:E_HEATER
max_power: 0.995
pwm_cycle_time: 0.1
smooth_time: 0.4
control: pid
pid_Kp: 1
pid_Ki: 1
pid_Kd: 1

sensor_type: MAX31865
sensor_pin: toolhead:MCU_31865_CS
spi_speed: 1000000
spi_software_sclk_pin: toolhead:MCU_31865_CLK
spi_software_mosi_pin: toolhead:MCU_31865_MOSI
spi_software_miso_pin: toolhead:MCU_31865_MISO
rtd_nominal_r: 1000
rtd_reference_r: 4300
rtd_num_of_wires: 2
rtd_use_50Hz_filter: True



