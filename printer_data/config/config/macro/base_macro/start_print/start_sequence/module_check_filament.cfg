[gcode_macro _CHECK_FILAMENT]
gcode:
  {% set filament_entry_sensor_enabled = printer["gcode_macro _USER_VARIABLES"].filament_entry_sensor_enabled %}
  {% set filament_toolhead_sensor_enabled = printer["gcode_macro _USER_VARIABLES"].filament_toolhead_sensor_enabled %}
  {% set filament_buffer_enabled = printer["gcode_macro _USER_VARIABLES"].filament_buffer_enabled %}

  

  {% if filament_toolhead_sensor_enabled %}
      {% set filament_toolhead_sensor_enabled = 0 %}
      {% if printer['filament_switch_sensor toolhead_sensor'].filament_detected == True %}
        {% set filament_toolhead_sensor_enabled = 1 %}
        RESPOND MSG="Филамент загружен в экструдер"
      {% endif %}
  {% endif %}

  {% if filament_buffer_enabled %}
      {% set filament_buffer_sensor_triggered = 0 %}
      {% if printer['filament_switch_sensor buffer_insert'].filament_detected == True %}
          {% set filament_buffer_sensor_triggered = 1 %}
          RESPOND MSG="Филамент загружен в буфер"
      {% endif %}
  {% endif %}

  {% if filament_toolhead_sensor_enabled and filament_buffer_enabled %}
      {% if filament_toolhead_sensor_triggered == 0 and filament_buffer_sensor_triggered == 0 %}
          { action_raise_error("Ошибка. Филамент не загружен в систему!") }

      {% elif filament_toolhead_sensor_enabled == 0 and filament_buffer_sensor_triggered == 1 %}
          RESPOND MSG="Филамент загружен в буфер но отсутствует в экструдере"
          RESPOND MSG="Начинаю загрузку филамента"
          PAUSE
      {% elif filament_toolhead_sensor_enabled == 1 and filament_buffer_sensor_triggered == 1 %}
          RESPOND MSG="Филамент загружен в систему, готов к печати"
      {% endif %}
  {% endif %}
